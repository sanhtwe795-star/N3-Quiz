<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4 Quiz Pop-up</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px; 
            background-color: #ffffff; 
            color: #333333;
        }
        /* Furigana စာလုံးအသေးကို Kanji ရဲ့ အပေါ်တည့်တည့်မှာ တင်တဲ့ CSS */
        ruby {
            ruby-position: over;
        }
        ruby rt { 
            font-size: 0.55em; 
            color: #666666; 
            padding-bottom: 2px;
        }
        .content-box {
            line-height: 2.5; 
            font-size: 1.2rem;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <b>問題4 (1)</b><br>
        これは、ある<ruby>映画館<rt>えいがかん</rt></ruby>のインターネットチケット<ruby>予約<rt>よやく</rt></ruby>サービスから、<ruby>村田<rt>むらた</rt></ruby>さんに<ruby>届<rt>とど</rt></ruby>いたメールである。
    </div>

</body>
</html>
